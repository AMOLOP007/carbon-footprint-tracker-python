<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- The definitions strictly requested from your code snippet -->
  <defs>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F766E" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Orbital rings matching the image's hi-tech minimalist aesthetic -->
  <g filter="url(#glow)">
    <!-- Inner dotted ring (darker/fainter) -->
    <circle cx="50" cy="50" r="40" stroke="#0F766E" stroke-width="1.5" stroke-dasharray="2 6" fill="none" opacity="0.4" />
    <!-- Outer dashed ring (brighter) -->
    <circle cx="50" cy="50" r="48" stroke="url(#leafGradient)" stroke-width="2" stroke-dasharray="6 10" fill="none" opacity="0.2" />
  </g>

  <!-- The single-line minimalist leaf shape matching the image perfectly -->
  <g filter="url(#glow)" transform="translate(50 50) scale(1.1) translate(-50 -50)">
    <!-- Outer Leaf Shell -->
    <path 
      d="M 40 65 C 28 40, 48 22, 75 25 C 85 50, 60 75, 40 65 Z" 
      stroke="url(#leafGradient)" 
      stroke-width="3.5" 
      stroke-linecap="round" 
      stroke-linejoin="round"
      fill="none"
    />
    <!-- Swooping Inner Vein and Stem -->
    <path 
      d="M 32 80 Q 38 75 40 65 Q 45 50 60 48" 
      stroke="url(#leafGradient)" 
      stroke-width="3.5" 
      stroke-linecap="round" 
      fill="none"
    />
  </g>
</svg>
