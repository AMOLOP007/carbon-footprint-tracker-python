<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Organic Leaf Gradient -->
    <linearGradient id="leafGradient" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="50%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#34D399" />
    </linearGradient>
    <!-- Vibrant node gradient -->
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Faint organic background aura -->
  <path
    d="M50 2 C20 2, 5 30, 10 60 C15 90, 40 95, 50 95 C60 95, 85 90, 90 60 C95 30, 80 2, 50 2 Z"
    stroke="currentColor"
    stroke-width="1"
    fill="none"
    opacity="0.1"
  />

  <g filter="url(#glow)">
    <!-- Main leaf body: Curving elegantly down into a stem -->
    <path
      d="M50 5 C15 15, 5 45, 15 75 C25 105, 50 95, 50 95 C50 95, 75 105, 85 75 C95 45, 85 15, 50 5 Z"
      stroke="url(#leafGradient)"
      stroke-width="3.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <!-- The Stem -->
    <path d="M50 95 C45 100, 45 105, 48 110" stroke="url(#leafGradient)" stroke-width="3" stroke-linecap="round" />

    <!-- Central Vein sweeping organically -->
    <path d="M50 95 C45 65, 55 35, 50 5" stroke="url(#leafGradient)" stroke-width="2.5" stroke-linecap="round" />
    
    <!-- Organic Side Veins branching off with bio-tech nodes -->
    <!-- Lower Left Vein -->
    <path d="M48 70 C35 75, 25 70, 20 60" stroke="url(#leafGradient)" stroke-width="2" stroke-linecap="round" />
    <circle cx="20" cy="60" r="3" fill="url(#nodeGradient)" />
    
    <!-- Middle Right Vein -->
    <path d="M52 50 C65 45, 75 55, 85 50" stroke="url(#leafGradient)" stroke-width="2" stroke-linecap="round" />
    <circle cx="85" cy="50" r="3" fill="url(#nodeGradient)" />
    
    <!-- Upper Left Vein -->
    <path d="M49 35 C38 30, 28 35, 25 25" stroke="url(#leafGradient)" stroke-width="2" stroke-linecap="round" />
    <circle cx="25" cy="25" r="2.5" fill="url(#nodeGradient)" />
    
    <!-- Deep tiny circuit drops mimicking dew -->
    <circle cx="40" cy="50" r="1.5" fill="#34D399" />
    <circle cx="60" cy="70" r="1.5" fill="#34D399" />
    <circle cx="65" cy="30" r="2" fill="#0ea5e9" />
  </g>
</svg>
