<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <g transform="translate(50 50) rotate(35) scale(0.75) translate(-50 -50)">
    <!-- Left Half of Leaf (Lighter Green) -->
    <path 
      d="M 50 95 C 5 80, -5 30, 50 5 L 50 95 Z" 
      fill="#61A338" 
    />
    
    <!-- Right Half of Leaf (Darker Green) -->
    <path 
      d="M 50 5 C 105 30, 95 80, 50 95 L 50 5 Z" 
      fill="#53912D" 
    />
    
    <!-- Stem & Central Vein -->
    <path 
      d="M 50 105 L 50 5" 
      stroke="#3A6E1E" 
      stroke-width="3" 
      stroke-linecap="round"
    />

    <!-- Left Side Veins -->
    <path d="M 50 80 Q 30 75 15 55" stroke="#3A6E1E" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M 50 60 Q 30 55 18 35" stroke="#3A6E1E" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M 50 40 Q 35 35 28 20" stroke="#3A6E1E" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M 50 20 Q 40 18 38 10" stroke="#3A6E1E" stroke-width="1.5" stroke-linecap="round" fill="none"/>

    <!-- Right Side Veins (Slightly asymmetrical for organic feel) -->
    <path d="M 50 75 Q 70 70 85 50" stroke="#3A6E1E" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M 50 55 Q 70 50 82 30" stroke="#3A6E1E" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M 50 35 Q 65 30 72 15" stroke="#3A6E1E" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M 50 18 Q 58 15 60 8" stroke="#3A6E1E" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  </g>
</svg>
